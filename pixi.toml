[workspace]
authors = ["Sarthak Rathi <rathisarthak88@gmail.com>"]
channels = ["conda-forge"]
name = "IndiSight-Nowcast"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
start-db = "docker-compose up -d"
stop-db = "docker compose stop"
down-db = "docker-compose down"
ui = "streamlit run app/main.py"
jupyter = "jupyter lab"

[dependencies]
python = "3.10.*"
pandas = ">=2.3.3,<3"
numpy = ">=2.2.6,<3"
scikit-learn = ">=1.7.2,<2"
geopandas = ">=1.1.3,<2"
psycopg2 = ">=2.9.11,<3"
sqlalchemy = ">=2.0.48,<3"
geoalchemy2 = ">=0.18.4,<0.19"
jupyterlab = ">=4.5.6,<5"
xgboost = ">=3.2.0,<4"
shap = ">=0.48.0,<0.49"
streamlit = ">=1.55.0,<2"
pydeck = ">=0.9.1,<0.10"
qdrant-client = ">=1.17.1,<2"
langchain = ">=1.2.13,<2"
langchain-community = ">=0.3.31,<0.4"
litellm = ">=1.82.6,<2"
earthengine-api = ">=1.7.18,<2"
python-dotenv = ">=1.2.2,<2"
tqdm = ">=4.67.3,<5"
requests = ">=2.32.5,<3"
seaborn = ">=0.13.2,<0.14"
plotly = ">=6.6.0,<7"

[feature.cpu.pypi-dependencies]
torch = "*"
torchvision = "*"

[feature.cuda.pypi-dependencies]
torch = { version = "*", index = "https://download.pytorch.org/whl/cu121" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu121" }

[environments]
default = ["cpu"]
gpu = ["cuda"]
